<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IPTV TV App - Sua TV Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M8 20L12 16L16 20" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <h1>IPTV TV App</h1>
            </div>
            <div class="header-controls">
                <button id="settingsBtn" class="icon-btn" title="Configurações">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </header>
        <div class="category-filter">
    <select id="categoryFilter">
        <option value="Todos">Todas as Categorias</option>
    </select>
</div>
        <div class="main-content">
            <aside class="sidebar">
                <div class="playlist-header">
                    <h2>Canais</h2>
                    <div class="playlist-controls">
                        <button id="loadPlaylistBtn" class="btn-secondary" title="Carregar Playlist">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                        </button>
                        <button id="refreshPlaylistBtn" class="btn-secondary" title="Atualizar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar canais...">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </div>
                <div id="channelList" class="channel-list"></div>
            </aside>

            <main class="player-area">
                <div id="playerContainer" class="player-container">
                    <div class="player-placeholder">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="M10 8l6 4-6 4V8z"/>
                        </svg>
                        <p>Selecione um canal para assistir</p>
                    </div>
                </div>
               <div id="channelInfo" class="channel-info hidden">
    <img id="currentChannelLogo" class="current-logo" style="display: none;">
    <div class="channel-text">
        <h3 id="currentChannelName"></h3>
        <p id="currentChannelGroup"></p>
    </div>
</div>
            </main>
        </div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Configurações</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>URL da Playlist M3U:</label>
                        <input type="url" id="playlistUrl" placeholder="https://exemplo.com/playlist.m3u">
                        <small>Cole a URL da sua lista M3U</small>
                    </div>
                    <div class="form-group">
                        <label>URL do EPG (opcional):</label>
                        <input type="url" id="epgUrl" placeholder="https://exemplo.com/epg.xml">
                    </div>
                    <button id="saveSettingsBtn" class="btn-primary">Salvar Configurações</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
